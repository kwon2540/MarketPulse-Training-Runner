name: Train MarketPulse (Private Source)

on:
  workflow_call:
    inputs:
      triggered_by:
        required: false
        type: string
      force:
        required: false
        type: string
      model_families:
        required: false
        type: string
      required_families:
        required: false
        type: string
      experiment_set:
        required: false
        type: string
      experiment_ids:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Who triggered this run (railway/manual/scheduler)"
        required: false
        default: "manual"
        type: string
      force:
        description: "Force run"
        required: false
        default: "false"
        type: string
      model_families:
        description: "legacy_full or catboost_family"
        required: false
        default: "legacy_full"
        type: string
      required_families:
        description: "Required families/targets to succeed"
        required: false
        default: "legacy_full"
        type: string
      experiment_set:
        description: "Experiment set when using family trainers"
        required: false
        default: "catboost_research_v1"
        type: string
      experiment_ids:
        description: "Optional comma-separated experiment ids"
        required: false
        default: ""
        type: string

concurrency:
  group: marketpulse-public-runner
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TARGET_REPO: kwon2540/MarketPulse-Railway
      TARGET_REF: main
      MODEL_ARTIFACT_BRANCH: model-artifacts
      TRAIN_DATA_SOURCE: db
      TRAIN_DB_REQUIRED: "true"
      TRAIN_ALLOW_OKX_FALLBACK: "false"
      TRAIN_MIN_ROWS: "10000"
      REPO_VISIBILITY: private
      KAGGLE_PUSH_REQUIRED: "true"
      TRAINING_PROVIDER: github_actions
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Resolve model set
        id: modelset
        shell: bash
        run: |
          model_families="${{ inputs.model_families || github.event.inputs.model_families || 'legacy_full' }}"
          required_families="${{ inputs.required_families || github.event.inputs.required_families || 'legacy_full' }}"
          experiment_set="${{ inputs.experiment_set || github.event.inputs.experiment_set || 'catboost_research_v1' }}"
          experiment_ids="${{ inputs.experiment_ids || github.event.inputs.experiment_ids || '' }}"
          echo "model_families=${model_families}" >> "$GITHUB_OUTPUT"
          echo "required_families=${required_families}" >> "$GITHUB_OUTPUT"
          echo "experiment_set=${experiment_set}" >> "$GITHUB_OUTPUT"
          echo "experiment_ids=${experiment_ids}" >> "$GITHUB_OUTPUT"

      - name: Clone private training repository
        env:
          TARGET_REPO_PAT: ${{ secrets.TARGET_REPO_PAT }}
        run: |
          set -euo pipefail
          if [ -z "$TARGET_REPO_PAT" ]; then
            echo "TARGET_REPO_PAT secret is missing" >&2
            exit 1
          fi

          git clone --depth 1 --branch "$TARGET_REF" \
            "https://x-access-token:${TARGET_REPO_PAT}@github.com/${TARGET_REPO}.git" workspace

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install training dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch==2.5.1
          python -m pip install --no-cache-dir \
            pandas==2.1.3 \
            numpy==1.26.2 \
            scikit-learn==1.6.1 \
            ta==0.11.0 \
            requests==2.31.0 \
            psycopg2-binary==2.9.9 \
            xgboost==2.1.4 \
            catboost==1.2.5 \
            tensorflow-cpu==2.16.1 \
            pytorch-tabnet==4.1.0

      - name: Run training
        working-directory: workspace
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
          MODEL_ARTIFACT_REPO: kwon2540/MarketPulse-Railway
          MODEL_ARTIFACT_BRANCH: model-artifacts
          TRAIN_MODEL_FAMILIES: ${{ steps.modelset.outputs.model_families }}
          TRAIN_REQUIRED_FAMILIES: ${{ steps.modelset.outputs.required_families }}
          TRAIN_EXPERIMENT_SET: ${{ steps.modelset.outputs.experiment_set }}
          TRAIN_EXPERIMENT_IDS: ${{ steps.modelset.outputs.experiment_ids }}
        run: |
          set -euo pipefail
          python train_family_runner.py 2>&1 | tee /tmp/train.log
          echo "----- normalized result -----"
          grep -E "^TRAINING_RESULT=|^FAIL_REASON=" /tmp/train.log || true

      - name: Publish model artifacts
        if: success()
        working-directory: workspace
        env:
          TRAIN_MODEL_FAMILIES: ${{ steps.modelset.outputs.model_families }}
          TRAIN_EXPERIMENT_SET: ${{ steps.modelset.outputs.experiment_set }}
          MODEL_ARTIFACT_BRANCH: ${{ env.MODEL_ARTIFACT_BRANCH }}
          MODEL_ARTIFACT_COMMIT_MESSAGE: "Update model artifacts (${{ steps.modelset.outputs.model_families }} / ${{ steps.modelset.outputs.experiment_set }})"
        run: |
          set -euo pipefail
          python publish_model_artifacts.py

      - name: Verify model-artifacts head
        if: success()
        working-directory: workspace
        run: |
          set -euo pipefail
          git fetch origin "$MODEL_ARTIFACT_BRANCH" --depth=1
          git rev-parse --verify FETCH_HEAD
