name: Train MarketPulse (Private Source)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Training mode: lite or full"
        required: true
        default: "lite"
        type: choice
        options:
          - lite
          - full
      force:
        description: "Reserved flag for compatibility"
        required: false
        default: "false"
        type: string
  schedule:
    - cron: "0 */4 * * *"

concurrency:
  group: marketpulse-public-runner
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      TARGET_REPO: kwon2540/MarketPulse-Railway
      TARGET_REF: main
      MODEL_ARTIFACT_BRANCH: model-artifacts
      TRAIN_DATA_SOURCE: db
      TRAIN_DB_REQUIRED: "true"
      TRAIN_ALLOW_OKX_FALLBACK: "false"
      TRAIN_MIN_ROWS: "10000"
      REPO_VISIBILITY: private
      KAGGLE_PUSH_REQUIRED: "true"
      TRAINING_PROVIDER: github_actions
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Resolve model set
        id: modelset
        shell: bash
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            MODE="lite"
          fi

          if [ "$MODE" = "full" ]; then
            echo "train_models=xgboost,catboost,transformer,informer,tabnet" >> "$GITHUB_OUTPUT"
            echo "required_models=xgboost,catboost,transformer,informer,tabnet" >> "$GITHUB_OUTPUT"
          else
            echo "train_models=xgboost,catboost" >> "$GITHUB_OUTPUT"
            echo "required_models=xgboost,catboost" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone private training repository
        env:
          TARGET_REPO_PAT: ${{ secrets.TARGET_REPO_PAT }}
        run: |
          if [ -z "$TARGET_REPO_PAT" ]; then
            echo "TARGET_REPO_PAT secret is missing" >&2
            exit 1
          fi

          git clone --depth 1 --branch "$TARGET_REF" \
            "https://x-access-token:${TARGET_REPO_PAT}@github.com/${TARGET_REPO}.git" workspace

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch==2.5.1
          python -m pip install --no-cache-dir \
            pandas==2.1.3 \
            numpy==1.26.2 \
            scikit-learn==1.6.1 \
            ta==0.11.0 \
            requests==2.31.0 \
            psycopg2-binary==2.9.9 \
            xgboost==2.1.4 \
            catboost==1.2.5 \
            tensorflow-cpu==2.16.1 \
            pytorch-tabnet==4.1.0

      - name: Run training
        working-directory: workspace
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
          MODEL_ARTIFACT_REPO: kwon2540/MarketPulse-Railway
          MODEL_ARTIFACT_BRANCH: model-artifacts
          TRAIN_MODELS: ${{ steps.modelset.outputs.train_models }}
          TRAIN_REQUIRED_MODELS: ${{ steps.modelset.outputs.required_models }}
        run: |
          python kaggle/train_all.py 2>&1 | tee /tmp/train.log
          echo "----- normalized result -----"
          grep -E "^TRAINING_RESULT=|^FAIL_REASON=" /tmp/train.log || true

      - name: Verify model-artifacts head
        if: success()
        working-directory: workspace
        run: |
          git fetch origin "$MODEL_ARTIFACT_BRANCH" --depth=1
          git rev-parse --verify FETCH_HEAD
